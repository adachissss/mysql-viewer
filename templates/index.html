<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>Connection</h2>
        <input type="text" id="host" placeholder="Host (localhost)" value="localhost">
        <input type="text" id="port" placeholder="Port (3306)" value="3306">
        <input type="text" id="user" placeholder="Username" value="root">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loadDatabases()">Connect</button>
        <button onclick="refreshDatabases()" id="refresh-btn">Refresh DB List</button>
        <div class="conn-status" id="conn-status">Disconnected</div>
        <ul id="db-list"></ul>
    </div>
    <div class="main">
        <div class="header">
            <h1 id="header-title">MySQL Viewer</h1>
            <span id="current-db">No database selected</span>
        </div>
        <div id="content">
            <div class="loading">Enter connection info on the left and click Connect</div>
        </div>
    </div>
    <div id="context-menu" class="context-menu"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
